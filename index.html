<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dad Joke of the Day</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="joke-box">
            <h1>😂 Dad Joke of the Day 😂</h1>
            <div class="joke-content">
                <p id="joke-text">Loading today's joke...</p>
            </div>
            <button id="next-button">Get Another Joke</button>
            <p class="loading" id="loading-indicator" style="display: none;">⏳ Fetching a joke...</p>
            <p class="date-info">Updated: <span id="date-display"></span></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
